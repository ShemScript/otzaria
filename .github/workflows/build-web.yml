name: Build Flutter Web

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          cache: true

      - name: Bulldozer Mode (Fixing conflicts automatically)
        run: |
          # 1. מעיף את כל רכיבי הבדיקה
          yq -i 'del(.dev_dependencies)' pubspec.yaml
          
          # 2. מוחק את קובץ החוקים המחמירים
          rm -f analysis_options.yaml
          
          # 3. הזרקה חכמה של עקיפת התלויות ישירות לבלוק הקיים, בלי כפילויות!
          yq -i '.dependency_overrides.collection = "^1.19.0"' pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web App
        run: flutter build web --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: otzaria-web-build
          path: build/web
