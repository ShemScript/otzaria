name: Build Flutter Web

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Bulldozer Mode (Ultimate Fix)
        run: |
          # 1. מעיף את כל רכיבי הבדיקה שהכשילו אותנו בהתחלה
          yq -i 'del(.dev_dependencies)' pubspec.yaml
          
          # 2. מעיף שאריות של "עקיפות" שאולי נשארו מהנסיונות הקודמים שלנו
          yq -i 'del(.dependency_overrides)' pubspec.yaml || true
          
          # 3. מוחק את חוקי הבדיקה של גוגל
          rm -f analysis_options.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web App
        run: flutter build web --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: otzaria-web-build
          path: build/web
